services:
  mysql:
    image: mysql:8.0
    container_name: blog_vca_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog_vca
      MYSQL_USER: blog_user
      MYSQL_PASSWORD: BlogUserPassword2026
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - web
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build: .
    container_name: blog_vca_api
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - ./files:/app/files
    networks:
      - web

volumes:
  mysql_data:

networks:
  web:
    external: true